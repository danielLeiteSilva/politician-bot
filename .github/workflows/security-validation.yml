name: Security Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run TruffleHog secret scanner
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
    
    - name: Run Gitleaks secret scanner
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python for additional scans
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Python security tools
      run: |
        pip install detect-secrets
        pip install bandit
    
    - name: Run detect-secrets
      run: |
        detect-secrets scan --all-files --baseline .secrets.baseline || true
        detect-secrets scan --all-files --baseline .secrets.baseline
    
    - name: Run Bandit security linter
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . || true
    
    - name: Setup Node.js security audit
      run: |
        npm audit --audit-level high
        npm audit fix || true
    
    - name: Run npm audit
      run: npm audit
    
    - name: Check for hardcoded credentials
      run: |
        echo "Checking for hardcoded credentials..."
        grep -r -i "password\|secret\|token\|api_key\|akia\|sk-\|ghp_\|gho_\|ghu_\|ghs_\|ghr_" --include="*.js" --include="*.ts" --include="*.json" --include="*.env*" --include="*.config*" . || echo "No hardcoded credentials found"
    
    - name: Check for sensitive file patterns
      run: |
        echo "Checking for sensitive files..."
        find . -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name ".env" -o -name "id_rsa*" | head -10 || echo "No sensitive files found"
    
    - name: Run ESLint security rules
      run: |
        npx eslint . --ext .js,.ts --rule 'security/*: error' || true
    
    - name: Generate security report
      run: |
        echo "# Security Scan Report" > security-report.md
        echo "Generated on: $(date)" >> security-report.md
        echo "" >> security-report.md
        echo "## Scan Results" >> security-report.md
        echo "- TruffleHog: Completed" >> security-report.md
        echo "- Gitleaks: Completed" >> security-report.md
        echo "- Detect-secrets: Completed" >> security-report.md
        echo "- Bandit: Completed" >> security-report.md
        echo "- npm audit: Completed" >> security-report.md
        echo "- ESLint security: Completed" >> security-report.md
    
    - name: Upload security artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          security-report.md
          .secrets.baseline
        retention-days: 30
    
    - name: Comment PR with security results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('security-report.md')) {
            const report = fs.readFileSync('security-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Validation Report\n\n${report}\n\n✅ All security scans completed successfully!`
            });
          }

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Run linting
      run: npm run lint
    
    - name: Build project
      run: npm run build
    
    - name: Check bundle size
      run: |
        npm run build
        du -sh dist/ || echo "No dist folder found"

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check for outdated dependencies
      run: npm outdated || true
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high